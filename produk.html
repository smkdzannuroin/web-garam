<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produk — SCM Garam</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="../assets/css/style.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Sidebar (same as dashboard) -->
    <aside class="sidebar">
      <div class="brand">
        <h4><i class="fas fa-cubes me-2"></i>SCM Garam</h4>
        <small>Supply Chain Management</small>
      </div>
      <nav class="mt-3">
        <a href="dashboard.html" class="nav-link"
          ><i class="fas fa-tachometer-alt"></i> Dashboard</a
        >
        <a href="produk.html" class="nav-link active"
          ><i class="fas fa-box"></i> Produk</a
        >
        <a href="produksi.html" class="nav-link"
          ><i class="fas fa-industry"></i> Produksi</a
        >
        <a href="supplier.html" class="nav-link"
          ><i class="fas fa-handshake"></i> Supplier</a
        >
        <a href="gudang.html" class="nav-link"
          ><i class="fas fa-warehouse"></i> Gudang</a
        >
        <a href="distribusi.html" class="nav-link"
          ><i class="fas fa-truck"></i> Distribusi</a
        >
        <a href="transaksi.html" class="nav-link"
          ><i class="fas fa-receipt"></i> Transaksi</a
        >
        <a href="laporan.html" class="nav-link"
          ><i class="fas fa-file-alt"></i> Laporan</a
        >
        <hr
          style="border-color: rgba(255, 255, 255, 0.15); margin: 10px 20px"
        />
        <a href="#" class="nav-link" id="logoutBtn"
          ><i class="fas fa-sign-out-alt"></i> Logout</a
        >
      </nav>
    </aside>

    <div class="main-content">
      <div class="top-navbar">
        <span class="page-title"
          ><i class="fas fa-box me-2"></i>Manajemen Produk</span
        >
        <button class="theme-toggle" id="themeToggleBtn">
          <i class="fas fa-moon"></i> Dark
        </button>
      </div>

      <!-- Toolbar -->
      <div class="d-flex justify-content-between mb-3">
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#modalProduk"
          id="btnTambah"
        >
          <i class="fas fa-plus me-2"></i>Tambah Produk
        </button>
        <div class="input-group" style="max-width: 300px">
          <span class="input-group-text"><i class="fas fa-search"></i></span>
          <input
            type="text"
            class="form-control"
            placeholder="Cari produk..."
            id="searchProduk"
          />
        </div>
      </div>

      <!-- Tabel Produk -->
      <div class="card">
        <div class="card-body">
          <table class="table table-hover" id="tabelProduk" style="width: 100%">
            <thead>
              <tr>
                <th>#</th>
                <th>Nama Produk</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok (Kg)</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tabelProdukBody">
              <!-- Data akan dimuat otomatis dari Database via API -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Modal Tambah/Edit Produk -->
      <div class="modal fade" id="modalProduk" tabindex="-1">
        <div class="modal-dialog">
          <div
            class="modal-content"
            style="background: var(--bg-card); color: var(--text-primary)"
          >
            <div class="modal-header border-0">
              <h5 class="modal-title fw-bold">Tambah Produk</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <form id="formProduk">
                <div class="mb-3">
                  <label class="form-label fw-bold small">Nama Produk</label
                  ><input
                    type="text"
                    class="form-control"
                    id="namaProduk"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label fw-bold small">Kategori</label
                  ><select class="form-select" id="kategoriProduk">
                    <option>Garam Konsumsi</option>
                    <option>Garam Industri</option>
                    <option>Garam Mentah</option>
                  </select>
                </div>
                <div class="row">
                  <div class="col-6 mb-3">
                    <label class="form-label fw-bold small">Harga (Rp/Kg)</label
                    ><input
                      type="number"
                      class="form-control"
                      id="hargaProduk"
                      required
                    />
                  </div>
                  <div class="col-6 mb-3">
                    <label class="form-label fw-bold small">Stok (Kg)</label
                    ><input
                      type="number"
                      class="form-control"
                      id="stokProduk"
                      required
                    />
                  </div>
                </div>
                <div class="mb-3">
                  <label class="form-label fw-bold small">Deskripsi</label
                  ><textarea
                    class="form-control"
                    id="deskripsiProduk"
                    rows="3"
                  ></textarea>
                </div>
              </form>
            </div>
            <div class="modal-footer border-0">
              <button class="btn btn-secondary" data-bs-dismiss="modal">
                Batal</button
              ><button class="btn btn-primary" id="btnSimpanProduk">
                <i class="fas fa-save me-1"></i>Simpan
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/main.js"></script>
    <script>
      $(document).ready(function () {
        $("#btnSimpanProduk").click(async function () {
          const stok = parseFloat($("#stokProduk").val());

          const data = {
            nama_produk: $("#namaProduk").val(),
            kategori: $("#kategoriProduk").val(),
            harga: $("#hargaProduk").val(),
            setok: stok,
            setatus: stok > 0 ? "setok ada" : "setok habis",
          };

          const res = await apiPost("/produk", data);

          if (res && res.ok) {
            Swal.fire("Berhasil", "Produk berhasil ditambahkan", "success");

            $("#formProduk")[0].reset();

            bootstrap.Modal.getInstance(
              document.getElementById("modalProduk"),
            ).hide();

            loadProduk();
          } else {
            Swal.fire("Gagal", "Data produk gagal disimpan", "error");
          }
        });
        const dtTable = $("#tabelProduk").DataTable({
          pageLength: 10,
          language: {
            search: "Cari:",
            lengthMenu: "Tampilkan _MENU_ data",
            info: "_START_-_END_ dari _TOTAL_",
            paginate: { previous: "‹", next: "›" },
            emptyTable: "Belum ada data produk di database.",
          },
        });

        async function loadProduk() {
          try {
            // Memanggil API Backend
            const res = await apiGet("/produk");
            if (res && res.ok) {
              // Kosongkan tabel
              dtTable.clear();

              // Masukkan data asli ke tabel
              res.data.forEach((p, index) => {
                const statusBadge =
                  p.setok > 0
                    ? '<span class="badge-status success">Tersedia</span>'
                    : '<span class="badge-status danger">Habis</span>';

                dtTable.row.add([
                  index + 1,
                  p.nama_produk,
                  p.kategori,
                  formatRupiah(p.harga) + "/kg",
                  p.setok || 0,
                  statusBadge,
                  `<button class="btn btn-sm btn-outline-primary me-1"><i class="fas fa-edit"></i></button>
                 <button class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></button>`,
                ]);
              });
              // Tampilkan (gambar ulang) tabel
              dtTable.draw();
            }
          } catch (error) {
            console.error("Gagal memuat produk:", error);
          }
        }

        // Jalankan fungsi loadProduk saat halaman terbuka
        loadProduk();
      });
    </script>
  </body>
</html>
