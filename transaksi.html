<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaksi — SCM Garam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>

<body>
  <aside class="sidebar">
    <div class="brand">
      <h4><i class="fas fa-cubes me-2"></i>SCM Garam</h4><small>Supply Chain Management</small>
    </div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="produk.html" class="nav-link"><i class="fas fa-box"></i> Produk</a>
      <a href="produksi.html" class="nav-link"><i class="fas fa-industry"></i> Produksi</a>
      <a href="supplier.html" class="nav-link"><i class="fas fa-handshake"></i> Supplier</a>
      <a href="gudang.html" class="nav-link"><i class="fas fa-warehouse"></i> Gudang</a>
      <a href="distribusi.html" class="nav-link"><i class="fas fa-truck"></i> Distribusi</a>
      <a href="transaksi.html" class="nav-link active"><i class="fas fa-receipt"></i> Transaksi</a>
      <a href="laporan.html" class="nav-link"><i class="fas fa-file-alt"></i> Laporan</a>
      <hr style="border-color:rgba(255,255,255,0.15);margin:10px 20px;"><a href="#" class="nav-link" id="logoutBtn"><i
          class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="top-navbar">
      <span class="page-title"><i class="fas fa-receipt me-2"></i>Transaksi Penjualan</span>
      <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> Dark</button>
    </div>
    <div class="d-flex justify-content-between mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTransaksi"><i
          class="fas fa-plus me-2"></i>Buat Transaksi</button>
    </div>
    <div class="card">
      <div class="card-body">
        <table class="table table-hover" id="tabelTransaksi" style="width:100%">
          <thead>
            <tr>
              <th>No. Order</th>
              <th>Tanggal</th>
              <th>Pembeli</th>
              <th>Produk</th>
              <th>Jumlah (Kg)</th>
              <th>Total</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>

          </tbody>
        </table>
      </div>
    </div>
    <!-- Modal Transaksi -->
    <div class="modal fade" id="modalTransaksi" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content" style="background:var(--bg-card);color:var(--text-primary);">
          <div class="modal-header border-0">
            <h5 class="modal-title fw-bold">Buat Transaksi Baru</h5><button type="button" class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form>
              <div class="mb-3"><label class="form-label fw-bold small">Nama Pembeli</label><input type="text"
                  class="form-control" required placeholder="Instansi / Perorangan"></div>
              <div class="mb-3"><label class="form-label fw-bold small">Produk</label><select class="form-select">
                  <option>Garam Halus Premium</option>
                  <option>Garam Industri</option>
                  <option>Garam Krosok</option>
                </select></div>
              <div class="row">
                <div class="col-6 mb-3"><label class="form-label fw-bold small">Jumlah (Kg)</label><input type="number"
                    class="form-control" required></div>
                <div class="col-6 mb-3"><label class="form-label fw-bold small">Total Harga (Rp)</label><input
                    type="number" class="form-control" required></div>
              </div>
              <div class="mb-3"><label class="form-label fw-bold small">Tanggal</label><input type="date"
                  class="form-control" required></div>
            </form>
          </div>
          <div class="modal-footer border-0">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
            <button class="btn btn-primary"><i class="fas fa-save me-1"></i>Simpan</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/main.js"></script>
  <script>$(document).ready(function () { $('#tabelTransaksi').DataTable({ pageLength: 10, order: [[1, 'desc']], language: { search: 'Cari:', lengthMenu: 'Tampilkan _MENU_ data', info: '_START_-_END_ dari _TOTAL_', paginate: { previous: '‹', next: '›' } } }); });</script>
</body>

</html>
