<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — SCM Garam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card animate-fade-in">
      <div class="text-center mb-4">
        <i class="fas fa-key fa-3x mb-2" style="color: var(--warning);"></i>
        <h4 class="fw-bold">Lupa Password?</h4>
        <p class="text-muted small">Masukkan email Anda untuk mendapatkan link reset password.</p>
      </div>

      <form id="forgotForm">
        <div class="mb-3">
          <label class="form-label fw-bold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-bold py-2" id="forgotBtn">
          <i class="fas fa-paper-plane me-2"></i>Kirim Link Reset
        </button>
      </form>

      <hr>
      <p class="text-center text-muted small mb-0">
        Ingat password? <a href="login.html" class="fw-bold">Kembali ke Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = document.getElementById('forgotBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Mengirim...';

      const res = await apiPost('/forgot-password', { email });
      if (res && res.ok) {
        showAlert('success', 'Email Terkirim!', 'Silakan cek inbox email Anda.');
      } else {
        showAlert('error', 'Gagal', res?.data?.message || 'Email tidak ditemukan.');
      }
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Kirim Link Reset';
    });
  </script>
</body>
</html>
