<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SCM Garam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card animate-fade-in">
      <div class="text-center mb-4">
        <i class="fas fa-cubes fa-3x mb-2" style="color: var(--primary);"></i>
        <h4 class="fw-bold">SCM Garam</h4>
        <p class="text-muted small">Masuk ke akun Anda</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-bold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Masukkan password" required>
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label small" for="remember">Ingat saya</label>
          </div>
          <a href="forgot-password.html" class="small">Lupa password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" id="loginBtn">
          <i class="fas fa-sign-in-alt me-2"></i>Login
        </button>
      </form>

      <hr>
      <p class="text-center text-muted small mb-0">
        Belum punya akun? <a href="register.html" class="fw-bold">Daftar Sekarang</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Memproses...';

      const res = await apiPost('/login', { email, password });

      if (res && res.ok) {
        setToken(res.data.token);
        setUser(res.data.user);
        showToast('success', 'Login berhasil!');
        const role = res.data.user.role;
        setTimeout(() => {
          window.location.href = role === 'admin'
            ? '../admin/dashboard.html'
            : '../user/dashboard.html';
        }, 1000);
      } else {
        showAlert('error', 'Login Gagal', res?.data?.message || 'Email atau password salah.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
      }
    });
  </script>
</body>
</html>
