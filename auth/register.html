<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar — SCM Garam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card animate-fade-in">
      <div class="text-center mb-4">
        <i class="fas fa-cubes fa-3x mb-2" style="color: var(--primary);"></i>
        <h4 class="fw-bold">Buat Akun Baru</h4>
        <p class="text-muted small">Daftar untuk mulai menggunakan SCM Garam</p>
      </div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label fw-bold small">Nama Lengkap</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="name" placeholder="Nama lengkap" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">No. Telepon</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-phone"></i></span>
            <input type="tel" class="form-control" id="phone" placeholder="08xxxxxxxxxx">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Min. 8 karakter" required minlength="8">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold small">Konfirmasi Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password_confirmation" placeholder="Ulangi password" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" id="registerBtn">
          <i class="fas fa-user-plus me-2"></i>Daftar
        </button>
      </form>

      <hr>
      <p class="text-center text-muted small mb-0">
        Sudah punya akun? <a href="login.html" class="fw-bold">Login</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const password_confirmation = document.getElementById('password_confirmation').value;

      if (password !== password_confirmation) {
        showAlert('error', 'Gagal', 'Password tidak cocok!');
        return;
      }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Memproses...';

      const res = await apiPost('/register', { name, email, phone, password, password_confirmation });

      if (res && res.ok) {
        showAlert('success', 'Berhasil!', 'Akun berhasil dibuat. Silakan login.');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } else {
        showAlert('error', 'Gagal', res?.data?.message || 'Terjadi kesalahan.');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Daftar';
      }
    });
  </script>
</body>
</html>
