<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produksi — SCM Garam</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><h4><i class="fas fa-cubes me-2"></i>SCM Garam</h4><small>Supply Chain Management</small></div>
    <nav class="mt-3">
      <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="produk.html" class="nav-link"><i class="fas fa-box"></i> Produk</a>
      <a href="produksi.html" class="nav-link active"><i class="fas fa-industry"></i> Produksi</a>
      <a href="supplier.html" class="nav-link"><i class="fas fa-handshake"></i> Supplier</a>
      <a href="gudang.html" class="nav-link"><i class="fas fa-warehouse"></i> Gudang</a>
      <a href="distribusi.html" class="nav-link"><i class="fas fa-truck"></i> Distribusi</a>
      <a href="transaksi.html" class="nav-link"><i class="fas fa-receipt"></i> Transaksi</a>
      <a href="laporan.html" class="nav-link"><i class="fas fa-file-alt"></i> Laporan</a>
      <hr style="border-color:rgba(255,255,255,0.15);margin:10px 20px;"><a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>
  <div class="main-content">
    <div class="top-navbar">
      <span class="page-title"><i class="fas fa-industry me-2"></i>Manajemen Produksi</span>
      <button class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> Dark</button>
    </div>
    <div class="d-flex justify-content-between mb-3">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProduksi"><i class="fas fa-plus me-2"></i>Catat Produksi</button>
    </div>
    <div class="card">
      <div class="card-body">
        <table class="table table-hover" id="tabelProduksi" style="width:100%">
          <thead><tr><th>#</th><th>Batch</th><th>Produk</th><th>Supplier</th><th>Jumlah (Ton)</th><th>Tanggal</th><th>Status</th><th>Aksi</th></tr></thead>
          <tbody>
            <!-- Data akan dimuat dari MySQL -->
          </tbody>
        </table>
      </div>
    </div>
    <!-- Modal Catat Produksi -->
    <div class="modal fade" id="modalProduksi" tabindex="-1"><div class="modal-dialog"><div class="modal-content" style="background:var(--bg-card);color:var(--text-primary);"><div class="modal-header border-0"><h5 class="modal-title fw-bold">Catat Produksi Baru</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form><div class="mb-3"><label class="form-label fw-bold small">Produk</label><select class="form-select"><option>Garam Halus Premium</option><option>Garam Industri</option><option>Garam Krosok</option></select></div><div class="mb-3"><label class="form-label fw-bold small">Supplier</label><select class="form-select"><option>Tambak Madura</option><option>Tambak Pati</option></select></div><div class="row"><div class="col-6 mb-3"><label class="form-label fw-bold small">Jumlah (Ton)</label><input type="number" class="form-control" required></div><div class="col-6 mb-3"><label class="form-label fw-bold small">Tanggal</label><input type="date" class="form-control" required></div></div><div class="mb-3"><label class="form-label fw-bold small">Catatan</label><textarea class="form-control" rows="2"></textarea></div></form></div><div class="modal-footer border-0"><button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button class="btn btn-primary"><i class="fas fa-save me-1"></i>Simpan</button></div></div></div></div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/main.js"></script>
  <script>$(document).ready(function(){$('#tabelProduksi').DataTable({pageLength:10,language:{search:'Cari:',lengthMenu:'Tampilkan _MENU_ data',info:'_START_-_END_ dari _TOTAL_',paginate:{previous:'‹',next:'›'}}});});</script>
</body>
</html>
